<div class="flex flex-col lg:flex-row items-center justify-between gap-4 p-5 bg-white border-t border-slate-100">
  
  <!-- Info Izquierda -->
  <div class="flex items-center gap-4 text-slate-500 font-medium text-xs order-2 lg:order-1">
    <span>
      Mostrando <b class="text-slate-900">{{ from() }}</b> a <b class="text-slate-900">{{ to() }}</b> de <b class="text-slate-900">{{ total() }}</b>
    </span>
    <div class="h-4 w-[1px] bg-slate-200"></div>
    <div class="flex items-center gap-2">
      <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Ver:</span>
      <select 
        [ngModel]="perPage()" 
        (change)="onPageSizeChange($event)"
        class="bg-slate-50 border-none text-xs font-bold text-slate-700 rounded-lg py-1 px-2 outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
        @for (option of pageSizeOptions; track option) {
          <option [value]="option">{{ option }}</option>
        }
      </select>
    </div>
  </div>

  <!-- Controles Derecha -->
  <div class="flex items-center gap-1.5 order-1 lg:order-2">
    <!-- Anterior -->
    <button 
      (click)="onPageClick(currentPage() - 1)" 
      [disabled]="currentPage() === 1"
      class="w-9 h-9 flex items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-400 hover:text-indigo-600 hover:border-indigo-300 disabled:opacity-30 disabled:pointer-events-none transition-all">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
    </button>

    <!-- Páginas Compactas -->
    <div class="flex items-center gap-1">
      @for (page of pages(); track $index) {
        @if ($any(page) === '...') {
          <span class="w-9 h-9 flex items-center justify-center text-slate-400 text-xs font-bold tracking-widest">...</span>
        } @else {
          <button 
            (click)="onPageClick(page)"
            [ngClass]="page === currentPage() 
              ? 'bg-indigo-600 text-white border-indigo-600 shadow-md shadow-indigo-100 scale-105' 
              : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-300 hover:bg-indigo-50/30'"
            class="w-9 h-9 flex items-center justify-center rounded-xl text-xs font-black border transition-all">
            {{ page }}
          </button>
        }
      }
    </div>

    <!-- Siguiente -->
    <button 
      (click)="onPageClick(currentPage() + 1)" 
      [disabled]="currentPage() === lastPage()"
      class="w-9 h-9 flex items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-400 hover:text-indigo-600 hover:border-indigo-300 disabled:opacity-30 disabled:pointer-events-none transition-all">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg>
    </button>
  </div>
</div>
