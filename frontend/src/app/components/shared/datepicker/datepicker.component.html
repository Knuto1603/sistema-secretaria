<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">
      {{ label() }}
    </label>
  }
  
  <div class="relative group">
    <!-- Icono de Calendario -->
    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    </div>

    <!-- Input Nativo con Estilos Personalizados -->
    <input 
      type="date"
      [ngModel]="value()"
      (ngModelChange)="onValueChange($event)"
      [min]="minDate()"
      [max]="maxDate()"
      class="block w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-sm hover:border-slate-300"
    >
  </div>
</div>
