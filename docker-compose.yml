########################################################################
# Sistema Secretaría Académica FII-UNP
# docker-compose.yml – Orquestación completa
#
# SERVICIOS:
#   frontend   → Angular SPA en Nginx      → http://localhost:4200
#   nginx-api  → Proxy Nginx → PHP-FPM    → http://localhost:8000
#   backend    → Laravel 12 / PHP-FPM 8.2
#   queue      → Laravel Queue Worker
#   db         → MySQL 8.0
#   redis      → Redis 7 (cache / sesiones)
#
# USO:
#   docker compose up -d              # Levantar todo
#   docker compose down               # Apagar todo
#   docker compose logs -f backend    # Ver logs de un servicio
#   docker compose exec backend sh    # Entrar al contenedor
########################################################################

services:

  # ── Frontend Angular ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: secretaria-frontend
    ports:
      - "80:80"
    networks:
      - app-network
    restart: unless-stopped

  # ── Nginx (proxy para PHP-FPM) ────────────────────────────────────
  nginx-api:
    image: nginx:1.27-alpine
    container_name: secretaria-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # ── Backend Laravel / PHP-FPM ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: secretaria-backend
    volumes:
      - ./backend:/var/www/html
      - ./docker/backend/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - backend-storage:/var/www/html/storage
    env_file:
      - .env.docker
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # ── Queue Worker ──────────────────────────────────────────────────
  queue:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: secretaria-queue
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
      - backend-storage:/var/www/html/storage
    env_file:
      - .env.docker
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # ── MySQL 8.0 ─────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: secretaria-db
    environment:
      MYSQL_DATABASE: gestion_academica
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: secretaria
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    # ports:
    #   - "3306:3306"          # NO exponer MySQL en producción
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: secretaria-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped

# ── Redes ─────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ── Volúmenes persistentes ────────────────────────────────────────────
volumes:
  db-data:        # Datos de MySQL (persiste entre reinicios)
  redis-data:     # Datos de Redis
  backend-storage: # storage/ de Laravel (logs, uploads, cache)
