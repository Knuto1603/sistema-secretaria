<div class="flex flex-col gap-2">
    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Firma Digital Estudiante</label>
    <div class="relative bg-white border-2 border-dashed border-slate-200 rounded-3xl overflow-hidden group hover:border-indigo-300 transition-all">
    <canvas #sigCanvas 
        (mousedown)="startDrawing($event)" 
        (mousemove)="draw($event)" 
        (mouseup)="stopDrawing()"
        (mouseleave)="stopDrawing()"
        (touchstart)="startDrawingTouch($event)"
        (touchmove)="drawTouch($event)"
        (touchend)="stopDrawing()"
        class="w-full h-48 cursor-crosshair block">
    </canvas>
    <button type="button" (click)="clear()" class="absolute bottom-4 right-4 bg-slate-100 hover:bg-red-50 hover:text-red-600 p-2 rounded-xl transition-all">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    </div>
</div>
