@if (errorModal.visible()) {
  <!-- Backdrop -->
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">

    <!-- Modal -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4 overflow-hidden">

      <!-- Cabecera con ícono -->
      <div class="flex flex-col items-center px-6 pt-8 pb-4">
        <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mb-4">
          <svg class="w-7 h-7 text-red-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
          </svg>
        </div>

        <h2 class="text-lg font-semibold text-slate-800 text-center">Acceso denegado</h2>
        <p class="mt-2 text-sm text-slate-500 text-center leading-relaxed">
          {{ errorModal.config().message }}
        </p>
      </div>

      <!-- Botón -->
      <div class="px-6 pb-6 pt-2">
        <button
          (click)="accept()"
          class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-xl transition-colors">
          Aceptar
        </button>
      </div>

    </div>
  </div>
}
