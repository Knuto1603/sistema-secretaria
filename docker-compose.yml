########################################################################
# Sistema Secretaría Académica FII-UNP
# docker-compose.yml – Listo para EasyPanel y producción
#
# SERVICIOS:
#   frontend   → Angular SPA en Nginx      (puerto interno 80)
#   nginx-api  → Proxy Nginx → PHP-FPM    (puerto interno 80)
#   backend    → Laravel 12 / PHP-FPM 8.2
#   queue      → Laravel Queue Worker
#   db         → MySQL 8.0
#   redis      → Redis 7 (cache / sesiones)
#
# VARIABLES REQUERIDAS (configurar en EasyPanel o en .env):
#   APP_KEY, DB_PASSWORD, DB_ROOT_PASSWORD, API_URL
#
# USO LOCAL:
#   cp .env.docker.example .env
#   docker compose up -d --build
#
# EASYPANEL:
#   Conectar el repo en EasyPanel → Docker Compose
#   Exponer: frontend (puerto 80) y nginx-api (puerto 80)
#   Configurar las variables de entorno en la UI de EasyPanel
########################################################################

services:

  # ── Frontend Angular ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        API_URL: ${API_URL:-http://localhost:8000/api}
    networks:
      - app-network
    restart: unless-stopped

  # ── Nginx (proxy para PHP-FPM) ────────────────────────────────────
  nginx-api:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # ── Backend Laravel / PHP-FPM ─────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    volumes:
      - backend-storage:/var/www/html/storage
    environment:
      APP_NAME: ${APP_NAME:-Secretaria FII-UNP}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-gestion_academica}
      DB_USERNAME: ${DB_USERNAME:-secretaria}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@unp.edu.pe}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Secretaria FII-UNP}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # ── Queue Worker ──────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - backend-storage:/var/www/html/storage
    environment:
      APP_NAME: ${APP_NAME:-Secretaria FII-UNP}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-gestion_academica}
      DB_USERNAME: ${DB_USERNAME:-secretaria}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@unp.edu.pe}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Secretaria FII-UNP}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # ── MySQL 8.0 ─────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gestion_academica}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-secretaria}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped

# ── Redes ─────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ── Volúmenes persistentes ────────────────────────────────────────────
volumes:
  db-data:          # Datos de MySQL
  redis-data:       # Datos de Redis
  backend-storage:  # storage/ de Laravel (logs, uploads, cache)
