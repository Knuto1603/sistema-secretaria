<div class="space-y-6">

  <!-- Encabezado -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
    <div class="flex items-center gap-4">
      <button
        (click)="volver()"
        class="p-2 hover:bg-slate-100 rounded-xl transition-colors">
        <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>
      <div>
        <h2 class="text-xl font-black text-slate-800 tracking-tight">Gestión de Usuarios</h2>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">
          Administra usuarios del sistema
        </p>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
    <!-- Tab Headers -->
    <div class="border-b border-slate-200">
      <nav class="flex -mb-px">
        @for (tab of tabs; track tab.id) {
          <button
            (click)="setActiveTab(tab.id)"
            class="flex items-center gap-2 px-6 py-4 text-sm font-semibold border-b-2 transition-colors"
            [class.border-indigo-500]="activeTab() === tab.id"
            [class.text-indigo-600]="activeTab() === tab.id"
            [class.border-transparent]="activeTab() !== tab.id"
            [class.text-slate-500]="activeTab() !== tab.id"
            [class.hover:text-slate-700]="activeTab() !== tab.id"
            [class.hover:border-slate-300]="activeTab() !== tab.id">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="tab.icon"></path>
            </svg>
            {{ tab.label }}
          </button>
        }
      </nav>
    </div>

    <!-- Tab Content -->
    <div class="p-6">
      <ng-container *ngComponentOutlet="currentComponent"></ng-container>
    </div>
  </div>

</div>
