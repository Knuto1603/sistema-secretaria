########################################################################
# Sistema Secretaría Académica FII-UNP
# docker-compose.yml
#
# SERVICIOS EXPUESTOS (EasyPanel asigna el dominio):
#   gateway    → Angular SPA + proxy /api → nginx-api (puerto 80)
#
# SERVICIOS INTERNOS:
#   nginx-api  → Nginx → PHP-FPM (backend)
#   backend    → Laravel 12 / PHP-FPM 8.2
#   queue      → Laravel Queue Worker
#   db         → MySQL 8.0
#   redis      → Redis 7
########################################################################

services:

  # ── Frontend / Gateway (único punto de entrada) ───────────────────
  # Sirve el Angular SPA y proxea /api/* al backend internamente.
  # EasyPanel expone este servicio en el puerto 80 con su dominio.
  frontend:
    build:
      context: .
      dockerfile: docker/gateway/Dockerfile
    networks:
      - app-network
      - easypanel
    depends_on:
      - nginx-api
    restart: unless-stopped

  # ── Nginx (proxy interno para PHP-FPM) ────────────────────────────
  nginx-api:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # ── Backend Laravel / PHP-FPM ─────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    volumes:
      - backend-storage:/var/www/html/storage
    environment:
      APP_NAME: ${APP_NAME:-Secretaria FII-UNP}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-gestion_academica}
      DB_USERNAME: ${DB_USERNAME:-secretaria}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@unp.edu.pe}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Secretaria FII-UNP}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # ── Queue Worker ──────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - backend-storage:/var/www/html/storage
    environment:
      APP_NAME: ${APP_NAME:-Secretaria FII-UNP}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-gestion_academica}
      DB_USERNAME: ${DB_USERNAME:-secretaria}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@unp.edu.pe}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Secretaria FII-UNP}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # ── MySQL 8.0 ─────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gestion_academica}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-secretaria}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped

# ── Redes ─────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
  easypanel:
    external: true   # Red del proxy de EasyPanel (Caddy)

# ── Volúmenes persistentes ────────────────────────────────────────────
volumes:
  db-data:
  redis-data:
  backend-storage:
